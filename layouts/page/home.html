<style>
  .dot-accent {
    display: inline-block;
    vertical-align: baseline;
    position: relative;
    width: 0.21em;
    height: 0.21em;
    margin-left: 0.06em;
    transform: translateY(-0.05em);
    outline: none;
    cursor: zoom-in;
  }
  .dot-accent .dot-inner {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--accent);
    background-image: var(--mate-img, none);
    background-size: cover;
    background-position: center;
    box-shadow: 0 0 0 0 color-mix(in oklch, var(--accent) 40%, transparent);
    transition: box-shadow .3s;
  }
  .dot-accent .dot-zoom {
    position: absolute;
    left: 50%; top: 50%;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: var(--accent);
    background-image: var(--mate-img, none);
    background-size: cover;
    background-position: center;
    border: 1px solid var(--rule);
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.55), 0 0 0 1px color-mix(in oklch, var(--accent) 35%, transparent);
    transform: translate(-50%, -50%) scale(0.02);
    opacity: 0;
    pointer-events: none;
    transition: transform .45s cubic-bezier(.2,.8,.2,1), opacity .3s ease;
    z-index: 5;
  }
  .dot-accent:hover .dot-zoom,
  .dot-accent:focus-visible .dot-zoom,
  .dot-accent.is-zoomed .dot-zoom {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .dot-accent:hover .dot-inner,
  .dot-accent:focus-visible .dot-inner {
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 22%, transparent);
  }
  body:not(.has-mate-photo) .dot-accent .dot-zoom {
    background: repeating-linear-gradient(135deg, color-mix(in oklch, var(--fg) 10%, transparent) 0 2px, transparent 2px 14px), var(--accent);
  }
  body:not(.has-mate-photo) .dot-accent .dot-zoom::after {
    content: "drop a mate.jpg";
    position: absolute;
    inset: auto 0 24px 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--bg);
  }
  @media (max-width: 640px) {
    .dot-accent .dot-zoom { width: 160px; height: 160px; }
  }

  .center {
    display: grid;
    place-items: start center;
    padding: clamp(20px, 5vh, 56px) clamp(20px, 4vw, 48px);
    position: relative;
    z-index: 1;
  }
  .card {
    width: 100%;
    max-width: 860px;
    text-align: center;
    position: relative;
    margin-top: clamp(10px, 7vh, 90px);
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .eyebrow::before, .eyebrow::after {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--rule);
  }
  h1.name {
    margin: 0;
    font-family: var(--serif);
    font-weight: 500;
    font-style: italic;
    font-size: clamp(64px, 11vw, 148px);
    line-height: 0.92;
    letter-spacing: -0.025em;
    text-wrap: balance;
  }
  h1.name .dot-accent { color: var(--accent); font-style: normal; }
  .tag {
    margin: 22px auto 0;
    max-width: 46ch;
    font-family: var(--serif);
    font-size: clamp(16px, 1.5vw, 19px);
    line-height: 1.55;
    color: var(--muted);
    text-wrap: pretty;
  }
  .tag em { color: var(--accent); font-style: italic; font-weight: 500; }
  .nav {
    margin-top: clamp(40px, 6vw, 64px);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .nav a {
    flex: 1 1 0;
    min-width: 0;
    padding: 26px 16px;
    text-align: center;
    font-family: var(--mono);
    font-size: clamp(13px, 1vw, 15px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    position: relative;
    transition: color .2s, background .25s;
    display: inline-flex;
    flex-direction: row;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .nav a svg { display: block; flex-shrink: 0; }
  .nav a + a { border-left: 1px solid var(--rule); }
  .nav a .sub {
    font-family: var(--serif);
    font-size: clamp(12px, 0.95vw, 14px);
    letter-spacing: 0;
    text-transform: none;
    color: var(--faint);
    font-style: italic;
    transition: color .2s;
  }
  .nav a::before {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: center;
    transition: transform .3s ease;
  }
  .nav a:hover {
    color: var(--accent);
    background: color-mix(in oklch, var(--accent) 6%, transparent);
  }
  .nav a:hover::before { transform: scaleX(1); }
  .nav a:hover .sub { color: var(--accent); }
  .nav a .arrow {
    display: inline-block;
    opacity: 0;
    transform: translate(-4px, 0);
    transition: opacity .2s, transform .2s;
    margin-left: 4px;
    color: var(--accent);
  }
  .nav a:hover .arrow { opacity: 1; transform: translate(0, 0); }
  @media (max-width: 640px) {
    .nav { flex-direction: column; }
    .nav a + a { border-left: none; border-top: 1px solid var(--rule); }
  }
</style>
{{ end }}

{{ define "scripts" }}
<script>
  // Mate dot — probe for photo (runs on each visit to home via Turbo)
  function probe(src) {
    return new Promise(res => {
      const im = new Image();
      im.onload = () => res(src);
      im.onerror = () => res(null);
      im.src = src;
    });
  }
  (async () => {
    const candidates = ["mate.jpg", "mate.jpeg", "mate.png", "mate.webp"];
    for (const c of candidates) {
      const ok = await probe(c);
      if (ok) {
        document.body.classList.add("has-mate-photo");
        document.documentElement.style.setProperty("--mate-img", `url("${c}")`);
        return;
      }
    }
  })();

  // Trackpad pinch-to-zoom — bind once globally; resolve mate-dot each event so Turbo revisits stay correct
  if (!window.__mateDotZoomBound) {
    window.__mateDotZoomBound = true;
    let zoomTimer;
    function mateDot() {
      return document.getElementById("mate-dot");
    }
    function showZoom() {
      const d = mateDot();
      if (!d) return;
      d.classList.add("is-zoomed");
      clearTimeout(zoomTimer);
      zoomTimer = setTimeout(() => d.classList.remove("is-zoomed"), 1400);
    }
    window.addEventListener("wheel", e => {
      if (!e.ctrlKey) return;
      const d = mateDot();
      if (!d) return;
      if (e.deltaY < 0) showZoom();
      else d.classList.remove("is-zoomed");
    }, { passive: true });
    window.addEventListener("gesturestart", e => e.preventDefault());
    window.addEventListener("gesturechange", e => {
      const d = mateDot();
      if (!d) return;
      if (e.scale > 1.05) showZoom();
      else if (e.scale < 0.95) d.classList.remove("is-zoomed");
    });
    window.addEventListener("keydown", e => {
      if ((e.key === "+" || e.key === "=") && !e.metaKey && !e.ctrlKey) showZoom();
    });
  }
</script>
{{ end }}
