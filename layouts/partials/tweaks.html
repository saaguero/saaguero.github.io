<div class="tweaks-panel" id="tweaks">
  <h6>Tweaks</h6>
  <div class="tweak-row">
    <label>Theme</label>
    <div class="seg" data-key="theme">
      <button data-val="dark">Dark</button>
      <button data-val="light">Light</button>
    </div>
  </div>
  <div class="tweak-row">
    <label>Accent</label>
    <div class="seg" data-key="accent">
      <button data-val="mate">Mate</button>
      <button data-val="dulce">Dulce</button>
      <button data-val="cielo">Cielo</button>
    </div>
  </div>
  <div class="tweak-row">
    <label>Layout</label>
    <div class="seg" data-key="variant">
      <button data-val="default">Default</button>
      <button data-val="rule">Rule</button>
      <button data-val="monogram">Monogram</button>
    </div>
  </div>
</div>
