<style>
  :root {
    color-scheme: dark light;
    --bg:    oklch(0.18 0.005 250);
    --fg:    oklch(0.95 0.005 80);
    --muted: oklch(0.58 0.008 80);
    --faint: oklch(0.36 0.006 80);
    --rule:  oklch(0.28 0.005 250);
    --accent: oklch(0.74 0.13 135);
    --live:  oklch(0.78 0.15 145);
    --serif: "Newsreader", Georgia, serif;
    --mono:  "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  [data-theme="light"] {
    --bg:    oklch(0.975 0.006 85);
    --fg:    oklch(0.22 0.005 250);
    --muted: oklch(0.42 0.008 80);
    --faint: oklch(0.62 0.006 80);
    --rule:  oklch(0.82 0.006 80);
    --accent: oklch(0.48 0.13 135);
    --live:  oklch(0.55 0.15 145);
  }

  * { box-sizing: border-box; }
  html {
    margin: 0; padding: 0; height: 100%;
    background: oklch(0.18 0.005 250);
  }
  html[data-theme="light"] { background: oklch(0.975 0.006 85); }
  body { margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
  }

  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, color-mix(in oklch, var(--fg) 3%, transparent) 1px, transparent 1px);
    background-size: calc(100% / 12) 100%;
    mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    pointer-events: none;
    opacity: 0.55;
  }
  @media (max-width: 720px) { .stage::before { display: none; } }

  /* ——— Top bar ——— */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px clamp(20px, 4vw, 48px);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
    z-index: 2;
  }
  .topbar .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live);
    margin-right: 8px;
    box-shadow: 0 0 0 0 var(--live);
    animation: pulse 2.4s ease-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--live) 55%, transparent); }
    70%  { box-shadow: 0 0 0 7px color-mix(in oklch, var(--live) 0%,  transparent); }
    100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--live) 0%,  transparent); }
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-left a {
    color: var(--muted);
    text-decoration: none;
    transition: color .2s;
  }
  .topbar-left a:hover { color: var(--accent); }

  /* SLO easter egg */
  .slo {
    position: relative;
    padding: 6px 10px;
    margin: -6px -10px;
    border-radius: 2px;
    outline: none;
    cursor: default;
    transition: background .2s, color .2s;
  }
  .slo:hover, .slo:focus-visible, .slo.is-open {
    color: var(--fg);
    background: color-mix(in oklch, var(--accent) 8%, transparent);
  }
  .slo .slo-hint {
    margin-left: 10px;
    font-size: 9px;
    color: var(--faint);
    letter-spacing: 0.24em;
    opacity: 0;
    transition: opacity .2s;
  }
  .slo:hover .slo-hint, .slo:focus-visible .slo-hint { opacity: 0; }

  .slo-pop {
    position: absolute;
    top: calc(100% + 12px);
    left: -4px;
    min-width: 420px;
    background: var(--bg);
    border: 1px solid var(--rule);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,.55);
    padding: 14px 16px 12px;
    opacity: 0;
    transform: translateY(-4px);
    pointer-events: none;
    transition: opacity .18s ease, transform .22s ease;
    z-index: 10;
    text-transform: none;
    letter-spacing: 0;
  }
  .slo-pop, .slo-pop * { cursor: default; }
  .slo-pop::before {
    content: "";
    position: absolute;
    top: -5px; left: 18px;
    width: 9px; height: 9px;
    background: var(--bg);
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
    transform: rotate(45deg);
  }
  .slo:hover .slo-pop,
  .slo:focus-visible .slo-pop,
  .slo.is-open .slo-pop {
    opacity: 1;
    transform: none;
    pointer-events: auto;
  }
  .slo-pop-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 10px;
  }
  .slo-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  table.slo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  table.slo-table th {
    text-align: left;
    font-weight: 500;
    color: var(--faint);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 10px 6px 0;
    border-bottom: 1px solid var(--rule);
  }
  table.slo-table td {
    padding: 6px 10px 6px 0;
    border-top: 1px solid color-mix(in oklch, var(--rule) 55%, transparent);
    transition: background .16s ease, color .16s ease;
  }
  table.slo-table tbody tr:first-child td { border-top: none; }
  table.slo-table tbody tr:hover td {
    background: color-mix(in oklch, var(--accent) 10%, transparent);
    color: var(--fg);
  }
  table.slo-table tbody tr:hover td:first-child { color: var(--accent); }
  table.slo-table td:first-child { color: var(--fg); font-weight: 500; }
  .slo-foot {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 12px;
    color: var(--muted);
  }
  .slo-copy-link {
    border: none;
    background: transparent;
    color: var(--faint);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 2px 0;
    border-bottom: 1px solid color-mix(in oklch, var(--faint) 45%, transparent);
    transition: color .2s ease, border-color .2s ease;
  }
  .slo-copy-link:hover, .slo-copy-link:focus-visible {
    color: var(--accent);
    border-color: color-mix(in oklch, var(--accent) 55%, transparent);
    outline: none;
  }
  .slo-copy-msg {
    margin-top: 6px;
    min-height: 12px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--faint);
    opacity: 0;
    transition: opacity .2s ease;
  }
  .slo-copy-msg.show { opacity: 1; }
  @media (max-width: 560px) {
    .slo-pop { min-width: 0; width: min(92vw, 420px); left: 0; }
  }

  /* Theme toggle */
  .theme-toggle {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 0;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    transition: color .2s, border-color .2s, background .2s, transform .2s;
  }
  .theme-toggle:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: color-mix(in oklch, var(--accent) 8%, transparent);
  }
  .theme-toggle:active { transform: scale(0.96); }
  .tt-label { display: none !important; }
  .theme-toggle .ic { display: block; }
  [data-theme="dark"]  .theme-toggle .ic-sun  { display: block; }
  [data-theme="dark"]  .theme-toggle .ic-moon { display: none; }
  [data-theme="light"] .theme-toggle .ic-sun  { display: none; }
  [data-theme="light"] .theme-toggle .ic-moon { display: block; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed;
    right: 20px; bottom: 20px;
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg);
    display: none;
    z-index: 50;
    min-width: 240px;
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.5);
  }
  .tweaks-panel.on { display: block; }
  .tweaks-panel h6 {
    margin: 0 0 12px;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .tweak-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 8px 0;
    border-top: 1px solid var(--rule);
  }
  .tweak-row:first-of-type { border-top: none; }
  .tweak-row label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .seg { display: inline-flex; border: 1px solid var(--rule); }
  .seg button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 5px 10px;
    font: inherit;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .seg button + button { border-left: 1px solid var(--rule); }
  .seg button.on { background: var(--accent); color: var(--bg); }

  /* Variant: monogram */
  body[data-variant="monogram"] h1.name { font-size: clamp(140px, 22vw, 320px); letter-spacing: -0.04em; }
  body[data-variant="monogram"] h1.name .rest { display: none; }
  body[data-variant="monogram"] .tag { margin-top: 8px; }

  /* Variant: rule */
  body[data-variant="rule"] .card::before,
  body[data-variant="rule"] .card::after { content: none; display: none; }
  body[data-variant="rule"] .eyebrow { display: none; }
  body[data-variant="rule"] h1.name { font-style: normal; font-weight: 500; }

  /* ——— Two-column section layout ——— */
  .two-col {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 0 clamp(40px, 5vw, 72px);
    max-width: 820px;
    margin: 0 auto;
    padding: clamp(40px, 8vh, 100px) clamp(20px, 4vw, 48px);
    position: relative;
    z-index: 1;
    align-content: start;
  }
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding-top: 4px;
    position: sticky;
    top: clamp(20px, 6vh, 60px);
    align-self: start;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--serif);
    font-size: 15px;
    color: var(--muted);
    text-decoration: none;
    position: relative;
    padding: 6px 10px;
    margin: 0 -10px;
    border-radius: 2px;
    transition: color .2s, background .25s;
  }
  .sidebar-link svg { flex-shrink: 0; }
  .sidebar-link::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 1px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: center;
    transition: transform .3s ease;
  }
  .sidebar-link:hover {
    color: var(--accent);
    background: color-mix(in oklch, var(--accent) 6%, transparent);
  }
  .sidebar-link:hover::before {
    transform: scaleY(1);
  }
  .sidebar-link.is-active {
    color: var(--accent);
  }
  .section-body {
    min-width: 0;
    width: 100%;
  }
  @media (max-width: 640px) {
    .two-col {
      grid-template-columns: 1fr;
      gap: 24px 0;
    }
    .sidebar {
      position: static;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 4px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 16px;
    }
    .sidebar-link .link-text { display: none; }
    .sidebar-link { padding: 6px 8px; margin: 0; }
    .sidebar-link::before {
      top: auto; bottom: 0; left: 0; right: 0;
      width: auto; height: 1px;
      transform: scaleX(0);
    }
    .sidebar-link:hover::before {
      transform: scaleX(1);
    }
  }

  /* Entry motion */
  .fade-up { opacity: 0; transform: translateY(10px); animation: fu .7s ease forwards; }
  .fade-up.d1 { animation-delay: .05s; }
  .fade-up.d2 { animation-delay: .18s; }
  .fade-up.d3 { animation-delay: .32s; }
  .fade-up.d4 { animation-delay: .46s; }
  @keyframes fu { to { opacity: 1; transform: none; } }
</style>
