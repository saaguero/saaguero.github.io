{{ define "head" }}
<style>
  .article-header {
    margin-bottom: clamp(32px, 5vh, 56px);
  }
  .article-header h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.2;
    margin: 0 0 12px;
    letter-spacing: -0.015em;
    text-wrap: balance;
  }
  .article-meta {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .article-meta time {
    color: var(--faint);
  }

  .article-body {
    font-family: var(--serif);
    font-size: clamp(17px, 1.35vw, 19px);
    line-height: 1.72;
    color: var(--fg);
  }
  .article-body > * + * {
    margin-top: 1.4em;
  }
  .article-body h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(22px, 2.2vw, 28px);
    margin-top: 2.4em;
    margin-bottom: 0.6em;
    letter-spacing: -0.01em;
  }
  .article-body h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(18px, 1.6vw, 22px);
    margin-top: 2em;
    margin-bottom: 0.5em;
  }
  .article-body a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: color-mix(in oklch, var(--accent) 40%, transparent);
    transition: text-decoration-color .2s;
  }
  .article-body a:hover {
    text-decoration-color: var(--accent);
  }
  .article-body strong {
    font-weight: 600;
  }
  .article-body em {
    font-style: italic;
  }
  .article-body blockquote {
    border-left: 2px solid var(--accent);
    margin: 1.6em 0;
    padding: 0.4em 0 0.4em 1.2em;
    color: var(--muted);
    font-style: italic;
  }
  .article-body blockquote p {
    margin: 0;
  }
  .article-body code {
    font-family: var(--mono);
    font-size: 0.88em;
    background: color-mix(in oklch, var(--fg) 8%, transparent);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .article-body pre {
    background: color-mix(in oklch, var(--fg) 6%, transparent);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 16px 20px;
    overflow-x: auto;
    line-height: 1.55;
  }
  .article-body pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }
  .article-body ul, .article-body ol {
    padding-left: 1.4em;
  }
  .article-body li + li {
    margin-top: 0.4em;
  }
  .article-body img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    border: 1px solid var(--rule);
  }
  .article-body hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 2.4em 0;
  }

  .article-footer {
    margin-top: clamp(48px, 6vh, 80px);
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .article-footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color .2s;
  }
  .article-footer a:hover { color: var(--accent); }
</style>
{{ end }}

{{ define "main" }}
<div class="two-col">
  {{ partial "sidebar.html" . }}

  <article class="section-body">
    <div class="article-header">
      <h1>{{ .Title }}</h1>
      <div class="article-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
        · {{ .ReadingTime }} min read
      </div>
    </div>

    <div class="article-body">
      {{ .Content }}
    </div>

    <div class="article-footer">
      <a href="/writing/">← All posts</a>
    </div>
  </article>
</div>
{{ end }}
